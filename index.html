<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Arata ✨</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lato:wght@300;400;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #0d0f14;
      --bg2: #13161d;
      --gold: #e8b86d;
      --gold-light: #f5d08a;
      --amber: #c97b2a;
      --text: #f0e6d0;
      --muted: #8a7e6e;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Lato', sans-serif;
      font-weight: 300;
      line-height: 1.6;
      overflow-x: hidden;
    }

    /* ─── HERO ─── */
    .hero {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      text-align: center;
      padding: 2rem;
      background:
        radial-gradient(ellipse 80% 60% at 50% 0%, rgba(232, 184, 109, 0.12) 0%, transparent 70%),
        radial-gradient(ellipse 60% 40% at 80% 80%, rgba(201, 123, 42, 0.08) 0%, transparent 60%),
        var(--bg);
      overflow: hidden;
    }

    /* fairy light string decoration */
    .fairy-lights {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      overflow: hidden;
    }

    .fairy-lights::before,
    .fairy-lights::after {
      content: '';
      position: absolute;
      top: 0;
      left: -10%;
      width: 120%;
      height: 2px;
      background: repeating-linear-gradient(
        90deg,
        transparent 0px,
        transparent 40px,
        rgba(232, 184, 109, 0.6) 40px,
        rgba(232, 184, 109, 0.6) 44px
      );
    }

    .fairy-lights::after {
      top: 28px;
      background: repeating-linear-gradient(
        90deg,
        transparent 0px,
        transparent 55px,
        rgba(232, 184, 109, 0.4) 55px,
        rgba(232, 184, 109, 0.4) 59px
      );
    }

    /* bulbs */
    .bulbs {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 80px;
      pointer-events: none;
    }

    .bulb {
      position: absolute;
      top: 0;
      width: 6px;
      height: 10px;
      border-radius: 50% 50% 40% 40%;
      animation: glow 3s ease-in-out infinite alternate;
    }

    @keyframes glow {
      from { opacity: 0.5; filter: blur(1px); }
      to   { opacity: 1;   filter: blur(0px) drop-shadow(0 0 6px currentColor); }
    }

    .hero-eyebrow {
      font-family: 'Lato', sans-serif;
      font-weight: 300;
      letter-spacing: 0.3em;
      font-size: 0.75rem;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 1.2rem;
      opacity: 0;
      animation: fadeUp 1s ease forwards 0.3s;
    }

    .hero-title {
      font-family: 'Playfair Display', serif;
      font-size: clamp(3.5rem, 10vw, 7rem);
      font-weight: 400;
      line-height: 1.05;
      color: var(--text);
      margin-bottom: 1rem;
      opacity: 0;
      animation: fadeUp 1s ease forwards 0.6s;
    }

    .hero-title em {
      font-style: italic;
      color: var(--gold);
    }

    .hero-sub {
      font-size: 1.05rem;
      color: var(--muted);
      letter-spacing: 0.05em;
      opacity: 0;
      animation: fadeUp 1s ease forwards 0.9s;
    }

    .hero-divider {
      margin: 2.5rem auto 0;
      width: 60px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      opacity: 0;
      animation: fadeUp 1s ease forwards 1.1s;
    }

    .scroll-hint {
      position: absolute;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.7rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
      opacity: 0;
      animation: fadeUp 1s ease forwards 1.5s;
    }

    .scroll-arrow {
      width: 1px;
      height: 30px;
      background: linear-gradient(180deg, var(--gold), transparent);
      animation: scrollPulse 2s ease-in-out infinite;
    }

    @keyframes scrollPulse {
      0%, 100% { opacity: 0.3; transform: scaleY(1); }
      50%       { opacity: 1;   transform: scaleY(1.2); }
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ─── SECTION COMMON ─── */
    section {
      padding: 6rem 2rem;
      max-width: 1200px;
      margin: 0 auto;
    }

    .section-label {
      font-family: 'Lato', sans-serif;
      font-weight: 300;
      letter-spacing: 0.3em;
      font-size: 0.7rem;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 1rem;
    }

    .section-title {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2rem, 5vw, 3rem);
      font-weight: 400;
      color: var(--text);
      margin-bottom: 1rem;
    }

    .section-title em {
      font-style: italic;
      color: var(--gold);
    }

    /* ─── GALLERY ─── */
    .gallery-section {
      max-width: 1400px;
      padding: 5rem 1.5rem;
    }

    .gallery-header {
      text-align: center;
      margin-bottom: 4rem;
    }

    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      grid-auto-rows: 280px;
      gap: 12px;
    }

    /* hero spans — every 5th photo gets wide, every 8th gets tall */
    .gallery-grid .photo:nth-child(5n+1) {
      grid-column: span 2;
    }

    .gallery-grid .photo:nth-child(7n+3) {
      grid-row: span 2;
    }

    .photo {
      overflow: hidden;
      border-radius: 4px;
      position: relative;
      cursor: pointer;
      opacity: 0;
      transform: translateY(15px);
      transition: opacity 0.6s ease, transform 0.6s ease;
    }

    .photo.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .photo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      display: block;
    }

    .photo:hover img {
      transform: scale(1.07);
    }

    .photo-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(
        to top,
        rgba(13, 15, 20, 0.5) 0%,
        transparent 50%
      );
      opacity: 0;
      transition: opacity 0.4s ease;
    }

    .photo:hover .photo-overlay {
      opacity: 1;
    }

    /* ─── LIGHTBOX ─── */
    .lightbox {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.92);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(4px);
    }

    .lightbox.open {
      display: flex;
    }

    .lightbox img {
      max-width: 90vw;
      max-height: 90vh;
      object-fit: contain;
      border-radius: 4px;
      box-shadow: 0 0 80px rgba(232, 184, 109, 0.15);
    }

    .lightbox-close {
      position: absolute;
      top: 1.5rem;
      right: 1.5rem;
      width: 40px;
      height: 40px;
      border: 1px solid rgba(232, 184, 109, 0.3);
      border-radius: 50%;
      background: transparent;
      color: var(--gold);
      font-size: 1.2rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s, border-color 0.2s;
    }

    .lightbox-close:hover {
      background: rgba(232, 184, 109, 0.1);
      border-color: var(--gold);
    }

    /* ─── FOOTER ─── */
    footer {
      border-top: 1px solid rgba(232, 184, 109, 0.1);
      padding: 3rem 2rem;
      text-align: center;
    }

    .footer-text {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-size: 1.1rem;
      color: var(--muted);
    }

    .footer-text span {
      color: var(--gold);
    }

    .footer-copy {
      margin-top: 1rem;
      font-size: 0.7rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(138, 126, 110, 0.4);
    }

    /* ─── MOBILE ─── */
    @media (max-width: 768px) {
      .gallery-grid {
        grid-template-columns: repeat(2, 1fr);
        grid-auto-rows: 200px;
      }

      .gallery-grid .photo:nth-child(4),
      .gallery-grid .photo:nth-child(7) {
        grid-column: span 1;
      }

      .gallery-grid .photo:nth-child(5) {
        grid-row: span 1;
      }
    }

    @media (max-width: 480px) {
      .gallery-grid {
        grid-template-columns: 1fr;
        grid-auto-rows: 260px;
      }
    }
  </style>
</head>
<body>

  <!-- HERO -->
  <div class="hero">
    <div class="fairy-lights"></div>

    <!-- decorative bulbs via JS below -->
    <div class="bulbs" id="bulbs"></div>

    <p class="hero-eyebrow">an evening with friends</p>
    <h1 class="hero-title"><em>Arata</em> ✨</h1>
    <p class="hero-sub">good people &nbsp;·&nbsp; good wine &nbsp;·&nbsp; good light</p>
    <div class="hero-divider"></div>

    <div class="scroll-hint">
      <span>gallery</span>
      <div class="scroll-arrow"></div>
    </div>
  </div>

  <!-- GALLERY -->
  <section class="gallery-section">
    <div class="gallery-header">
      <p class="section-label">the night</p>
      <h2 class="section-title">Memories from <em>the patio</em></h2>
    </div>

    <div class="gallery-grid" id="gallery">
      <div class="photo" onclick="openLightbox('photo1.jpg')"><img src="photo1.jpg" alt="Arata gathering 1" loading="lazy" /><div class="photo-overlay"></div></div>
      <div class="photo" onclick="openLightbox('photo2.jpg')"><img src="photo2.jpg" alt="Arata gathering 2" loading="lazy" /><div class="photo-overlay"></div></div>
      <div class="photo" onclick="openLightbox('photo3.jpg')"><img src="photo3.jpg" alt="Arata gathering 3" loading="lazy" /><div class="photo-overlay"></div></div>
      <div class="photo" onclick="openLightbox('photo4.jpg')"><img src="photo4.jpg" alt="Arata gathering 4" loading="lazy" /><div class="photo-overlay"></div></div>
      <div class="photo" onclick="openLightbox('photo5.jpg')"><img src="photo5.jpg" alt="Arata gathering 5" loading="lazy" /><div class="photo-overlay"></div></div>
      <div class="photo" onclick="openLightbox('photo6.jpg')"><img src="photo6.jpg" alt="Arata gathering 6" loading="lazy" /><div class="photo-overlay"></div></div>
      <div class="photo" onclick="openLightbox('photo7.jpg')"><img src="photo7.jpg" alt="Arata gathering 7" loading="lazy" /><div class="photo-overlay"></div></div>
      <div class="photo" onclick="openLightbox('photo8.jpg')"><img src="photo8.jpg" alt="Arata gathering 8" loading="lazy" /><div class="photo-overlay"></div></div>
      <div class="photo" onclick="openLightbox('photo9.jpg')"><img src="photo9.jpg" alt="Arata gathering 9" loading="lazy" /><div class="photo-overlay"></div></div>
      <div class="photo" onclick="openLightbox('photo10.jpg')"><img src="photo10.jpg" alt="Arata gathering 10" loading="lazy" /><div class="photo-overlay"></div></div>
      <div class="photo" onclick="openLightbox('photo11.jpg')"><img src="photo11.jpg" alt="Arata gathering 11" loading="lazy" /><div class="photo-overlay"></div></div>
      <div class="photo" onclick="openLightbox('photo12.jpg')"><img src="photo12.jpg" alt="Arata gathering 12" loading="lazy" /><div class="photo-overlay"></div></div>
      <div class="photo" onclick="openLightbox('photo13.jpg')"><img src="photo13.jpg" alt="Arata gathering 13" loading="lazy" /><div class="photo-overlay"></div></div>
      <div class="photo" onclick="openLightbox('photo14.jpg')"><img src="photo14.jpg" alt="Arata gathering 14" loading="lazy" /><div class="photo-overlay"></div></div>
      <div class="photo" onclick="openLightbox('photo15.jpg')"><img src="photo15.jpg" alt="Arata gathering 15" loading="lazy" /><div class="photo-overlay"></div></div>
      <div class="photo" onclick="openLightbox('photo16.jpg')"><img src="photo16.jpg" alt="Arata gathering 16" loading="lazy" /><div class="photo-overlay"></div></div>
      <div class="photo" onclick="openLightbox('photo17.jpg')"><img src="photo17.jpg" alt="Arata gathering 17" loading="lazy" /><div class="photo-overlay"></div></div>
      <div class="photo" onclick="openLightbox('photo18.jpg')"><img src="photo18.jpg" alt="Arata gathering 18" loading="lazy" /><div class="photo-overlay"></div></div>
      <div class="photo" onclick="openLightbox('photo19.jpg')"><img src="photo19.jpg" alt="Arata gathering 19" loading="lazy" /><div class="photo-overlay"></div></div>
    </div>
  </section>

  <!-- FOOTER -->
  <footer>
    <p class="footer-text">"<span>Some nights are just built different.</span>"</p>
    <p class="footer-copy">Arata &nbsp;·&nbsp; Hout Bay &nbsp;·&nbsp; 2026</p>
  </footer>

  <!-- LIGHTBOX -->
  <div class="lightbox" id="lightbox" onclick="closeLightbox()">
    <img id="lightbox-img" src="" alt="Full photo" />
    <button class="lightbox-close" onclick="closeLightbox()">✕</button>
  </div>

  <script>
    // ── Fairy light bulbs ──
    const bulbContainer = document.getElementById('bulbs');
    const colours = ['#e8b86d', '#f5d08a', '#c97b2a', '#ffeaa0', '#e8b86d'];
    for (let i = 0; i < 28; i++) {
      const b = document.createElement('span');
      b.classList.add('bulb');
      const left = (i / 27) * 96 + 2;
      const delay = (Math.random() * 3).toFixed(2);
      const dur   = (2 + Math.random() * 2).toFixed(2);
      const color = colours[i % colours.length];
      b.style.cssText = `left:${left}%;top:${2 + Math.sin(i) * 10}px;background:${color};color:${color};animation-delay:${delay}s;animation-duration:${dur}s;`;
      bulbContainer.appendChild(b);
    }

    // ── Scroll-in animation ──
    const photos = document.querySelectorAll('.photo');
    const observer = new IntersectionObserver((entries) => {
      entries.forEach((entry, i) => {
        if (entry.isIntersecting) {
          setTimeout(() => entry.target.classList.add('visible'), i * 80);
          observer.unobserve(entry.target);
        }
      });
    }, { threshold: 0.1 });

    photos.forEach(p => observer.observe(p));

    // ── Lightbox ──
    function openLightbox(src) {
      document.getElementById('lightbox-img').src = src;
      document.getElementById('lightbox').classList.add('open');
      document.body.style.overflow = 'hidden';
    }

    function closeLightbox() {
      document.getElementById('lightbox').classList.remove('open');
      document.body.style.overflow = '';
    }

    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') closeLightbox();
    });
  </script>
</body>
</html>
